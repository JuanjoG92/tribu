<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publicación · Tribu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

  <nav class="nav nav-solid" id="mainNav">
    <div class="nav-container">
      <a href="/" class="nav-logo"><i class="fas fa-seedling"></i><span>Tribu <span class="logo-sub" data-i18n="nav_brand_sub">Comunidad</span></span></a>
      <div class="nav-links" id="navLinks">
        <a href="/" data-i18n="nav_home">Inicio</a>
        <a href="/new-post" class="btn btn-amber btn-sm" data-i18n="btn_share">Compartir</a>
        <a href="/login" class="btn btn-primary btn-sm" id="navLoginBtn" data-i18n="nav_login">Ingresar</a>
        <a href="/login" class="btn btn-outline btn-sm" id="navLogoutBtn" style="display:none" onclick="logout()"><i class="fas fa-sign-out-alt"></i></a>
        <div class="lang-selector">
          <button class="lang-btn" onclick="toggleLangMenu()"><i class="fas fa-globe"></i> <span id="currentLang">ES</span></button>
          <div class="lang-menu" id="langMenu">
            <a onclick="setLang('es')">🇦🇷 Español</a><a onclick="setLang('en')">🇺🇸 English</a>
            <a onclick="setLang('pt')">🇧🇷 Português</a><a onclick="setLang('de')">🇩🇪 Deutsch</a>
            <a onclick="setLang('fr')">🇫🇷 Français</a><a onclick="setLang('ru')">🇷🇺 Русский</a>
            <a onclick="setLang('ja')">🇯🇵 日本語</a><a onclick="setLang('zh')">🇹🇼 繁體中文</a>
          </div>
        </div>
      </div>
      <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div style="min-height:100vh;padding:90px 20px 60px;background:var(--bg)">
    <div class="container" style="max-width:780px">
      <div id="postLoading" class="posts-loading"><i class="fas fa-spinner fa-spin"></i> <span data-i18n="loading">Cargando...</span></div>
      <div id="postContent" style="display:none">
        <a href="/" style="display:inline-flex;align-items:center;gap:8px;color:var(--green);font-weight:600;margin-bottom:20px;font-size:.9rem">
          <i class="fas fa-arrow-left"></i> <span data-i18n="nav_home">Inicio</span>
        </a>
        <div class="auth-card" style="padding:36px">
          <span id="pdCatBadge"></span>
          <h1 class="pd-title" id="pdTitle"></h1>
          <div class="pd-meta" id="pdMeta"></div>
          <img id="pdImg" class="pd-img" style="display:none"/>
          <div class="pd-body" id="pdBody"></div>
          <div id="pdVideo"></div>
          <div class="pd-author" id="pdAuthor"></div>
          <div class="pd-actions" id="pdActions"></div>
        </div>
      </div>
      <div id="postError" style="display:none;text-align:center;padding:80px 20px;color:var(--text-light)">
        <i class="fas fa-exclamation-circle fa-3x" style="color:var(--amber);margin-bottom:16px;display:block"></i>
        <h3>Post no encontrado</h3>
        <a href="/" class="btn btn-primary" style="margin-top:20px" data-i18n="nav_home">Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
